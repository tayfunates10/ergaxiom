name: Temporary Rust autofix

on:
  push:
    branches:
      - agent/graphic-designer-twin-v1

permissions:
  contents: write

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/graphic-designer-twin-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Apply machine-safe Clippy fixes
        run: cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit autofixes
        run: |
          if git diff --quiet; then
            echo "No autofix changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Apply Rust autofixes"
          git push origin HEAD:agent/graphic-designer-twin-v1
