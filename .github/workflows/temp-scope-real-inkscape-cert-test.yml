name: Temporary scope real Inkscape certification test

on:
  push:
    branches:
      - agent/real-inkscape-certified-delivery-v1
    paths:
      - ".github/workflows/temp-scope-real-inkscape-cert-test.yml"

permissions:
  contents: write

jobs:
  scope-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/real-inkscape-certified-delivery-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Add configured-environment guard
        shell: python
        run: |
          from pathlib import Path
          path = Path("crates/graphic-inkscape-certified-delivery-runtime/tests/certified_inkscape_delivery.rs")
          text = path.read_text(encoding="utf-8")
          old = '''    let executable = std::env::var("ERGAXIOM_INKSCAPE")?;
              let executable_digest = std::env::var("ERGAXIOM_INKSCAPE_SHA256")?;'''
          new = '''    let (Ok(executable), Ok(executable_digest)) = (
              std::env::var("ERGAXIOM_INKSCAPE"),
              std::env::var("ERGAXIOM_INKSCAPE_SHA256"),
          ) else {
              return Ok(());
          };'''
          if old not in text:
              raise SystemExit("environment binding target not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit scope guard
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/graphic-inkscape-certified-delivery-runtime/tests/certified_inkscape_delivery.rs
          git commit -m "Scope real Inkscape certification test to configured CI"
          git push origin HEAD:agent/real-inkscape-certified-delivery-v1
