name: Proof kernel

on:
  push:
    branches:
      - main
      - agent/**
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/proof-kernel/**"
      - ".github/workflows/proof-kernel.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/proof-kernel/**"
      - ".github/workflows/proof-kernel.yml"

permissions:
  contents: read

jobs:
  verify:
    name: Format, lint and test proof kernel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        id: formatting
        continue-on-error: true
        run: cargo fmt --all --check

      - name: Generate rustfmt patch
        if: steps.formatting.outcome == 'failure'
        run: |
          cargo fmt --all
          git diff --binary > rustfmt.patch

      - name: Upload rustfmt patch
        if: steps.formatting.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-patch
          path: rustfmt.patch
          if-no-files-found: error
          retention-days: 1

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

      - name: Fail on formatting mismatch
        if: steps.formatting.outcome == 'failure'
        run: exit 1
