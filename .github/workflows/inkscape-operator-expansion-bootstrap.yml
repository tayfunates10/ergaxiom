name: Inkscape operator expansion bootstrap

on:
  pull_request:
    paths:
      - ".bootstrap/**"
      - "crates/inkscape-adapter-runtime/**"
      - "professions/graphic-designer/profession.json"
      - ".github/workflows/inkscape-operator-expansion-bootstrap.yml"

permissions:
  contents: write

jobs:
  materialize-and-verify:
    if: github.head_ref == 'agent/inkscape-operator-expansion-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out operator branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install and bind Inkscape
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends inkscape
          executable="$(command -v inkscape)"
          digest="$(sha256sum "$executable" | awk '{print $1}')"
          echo "ERGAXIOM_INKSCAPE=$executable" >> "$GITHUB_ENV"
          echo "ERGAXIOM_INKSCAPE_SHA256=$digest" >> "$GITHUB_ENV"
          inkscape --version

      - name: Materialize proof-bound operator implementation and capsule pins
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee "$RUNNER_TEMP/operator-bootstrap.log") 2>&1
          cat .bootstrap/operators.part* | base64 --decode | gzip --decompress > crates/inkscape-adapter-runtime/src/operators.rs
          cat .bootstrap/realtest.part* | base64 --decode | gzip --decompress > crates/inkscape-adapter-runtime/tests/proof_bound_operators.rs
          python - <<'PY'
          import json
          from pathlib import Path

          for generated_path in [
              "crates/inkscape-adapter-runtime/src/operators.rs",
              "crates/inkscape-adapter-runtime/tests/proof_bound_operators.rs",
          ]:
              generated = Path(generated_path)
              text = generated.read_text(encoding="utf-8")
              text = text.replace('r#"<svg', 'r##"<svg').replace('</svg>"#', '</svg>"##')
              generated.write_text(text, encoding="utf-8")

          cargo = Path("crates/inkscape-adapter-runtime/Cargo.toml")
          text = cargo.read_text(encoding="utf-8")
          if "base64.workspace = true" not in text:
              text = text.replace("[dependencies]\n", "[dependencies]\nbase64.workspace = true\n", 1)
          cargo.write_text(text, encoding="utf-8")

          lib = Path("crates/inkscape-adapter-runtime/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          marker = "#![forbid(unsafe_code)]\n"
          module = "\nmod operators;\npub use operators::*;\n"
          if "mod operators;" not in text:
              text = text.replace(marker, marker + module, 1)
          lib.write_text(text, encoding="utf-8")

          capsule_path = Path("professions/graphic-designer/profession.json")
          capsule = json.loads(capsule_path.read_text(encoding="utf-8"))
          capsule["version"] = "0.3.0"
          operator_ids = [
              "inkscape.canvas.resize",
              "inkscape.layer.create",
              "inkscape.asset.place",
              "inkscape.text.create",
              "inkscape.color.set_fill",
              "inkscape.object.transform",
              "inkscape.object.align",
              "inkscape.object.distribute",
              "inkscape.document.save_svg",
              "inkscape.export.profiled",
          ]
          job_ids = capsule["job_types"][0]["operator_ids"]
          for operator_id in operator_ids:
              if operator_id not in job_ids:
                  job_ids.append(operator_id)

          common = {
              "version": "0.1.0",
              "output_types": ["editable_document"],
              "preconditions": [
                  "source_digest_matches_contract",
                  "trusted_inkscape_identity_is_bound",
                  "target_and_changed_properties_are_declared",
              ],
              "postconditions": [
                  "semantic_post_state_matches_declared_effect",
                  "undeclared_document_changes_are_absent",
                  "source_material_remains_immutable",
              ],
              "permissions": [
                  "application.control:inkscape",
                  "filesystem.write:isolated_workspace",
              ],
              "execution_methods": ["application_api", "cli", "signed_adapter"],
              "deterministic": True,
              "randomness_seed_required": False,
              "rollback": {
                  "supported": True,
                  "strategy": "discard partial output and restore the previous isolated checkpoint",
              },
          }
          specs = [
              ("inkscape.canvas.resize", "Resize the SVG canvas and viewBox using explicit positive pixel dimensions.", ["editable_document", "canvas_specification"]),
              ("inkscape.layer.create", "Create one explicitly identified Inkscape layer without changing existing elements.", ["editable_document", "layer_specification"]),
              ("inkscape.asset.place", "Place a digest-bound approved PNG or restricted SVG asset as a data URI.", ["editable_document", "approved_asset", "placement_specification"]),
              ("inkscape.text.create", "Create one direct SVG text element from approved copy and explicit typography.", ["editable_document", "approved_copy", "typography_specification"]),
              ("inkscape.color.set_fill", "Change only the declared fill property of one supported target.", ["editable_document", "approved_color", "target_reference"]),
              ("inkscape.object.transform", "Apply explicit translate, rotate and scale values to one declared target.", ["editable_document", "target_reference", "transform_specification"]),
              ("inkscape.object.align", "Align declared supported elements on one axis using measured geometry.", ["editable_document", "target_set", "alignment_specification"]),
              ("inkscape.object.distribute", "Distribute at least three declared supported elements on one axis.", ["editable_document", "target_set", "distribution_specification"]),
              ("inkscape.document.save_svg", "Save the verified editable SVG into a new isolated output path.", ["editable_document", "authorized_output"]),
              ("inkscape.export.profiled", "Export PNG, restricted SVG or PDF through an explicit media profile.", ["editable_document", "export_profile", "authorized_output"]),
          ]
          existing = {item["id"]: item for item in capsule["operators"]}
          for operator_id, description, input_types in specs:
              item = dict(common)
              item.update({
                  "id": operator_id,
                  "description": description,
                  "input_types": input_types,
              })
              if operator_id == "inkscape.asset.place":
                  item["permissions"] = [
                      "filesystem.read:contract_inputs",
                      "application.control:inkscape",
                      "filesystem.write:isolated_workspace",
                  ]
              if operator_id == "inkscape.export.profiled":
                  item["output_types"] = ["delivery_artifact"]
                  item["permissions"] = [
                      "application.control:inkscape",
                      "filesystem.write:declared_output",
                  ]
              existing[operator_id] = item
          original_ids = [item["id"] for item in capsule["operators"]]
          capsule["operators"] = [existing[item_id] for item_id in original_ids]
          capsule["operators"].extend(existing[item_id] for item_id in operator_ids)
          capsule_path.write_text(json.dumps(capsule, indent=2) + "\n", encoding="utf-8")
          PY
          cargo fmt --all

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inkscape-operator-bootstrap-diagnostics
          path: ${{ runner.temp }}/operator-bootstrap.log
          if-no-files-found: warn
          retention-days: 7

      - name: Lint expanded adapter
        run: cargo clippy -p ergaxiom-inkscape-adapter-runtime --all-targets --all-features -- -D warnings

      - name: Run deterministic operator and attack tests
        run: cargo test -p ergaxiom-inkscape-adapter-runtime

      - name: Run real Inkscape operator regression
        run: >-
          cargo test
          -p ergaxiom-inkscape-adapter-runtime
          --features real-inkscape-tests
          --test proof_bound_operators
          -- --nocapture

      - name: Commit verified sources and capsule pins
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/inkscape-adapter-runtime professions/graphic-designer/profession.json
          if git diff --cached --quiet; then
            echo "Verified sources and capsule pins are already materialized."
            exit 0
          fi
          git commit -m "Pin expanded Inkscape operators in the profession capsule"
          git push origin HEAD:${{ github.head_ref }}
