name: Temporary Windows Bridge test fix

on:
  push:
    branches:
      - agent/windows-bridge-protocol-v1

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/windows-bridge-protocol-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Fix receipt ownership in tests
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/windows-bridge-runtime/tests/windows_bridge.rs')
          text = path.read_text()
          text = text.replace('context.authorization,', 'context.authorization.clone(),')
          text = text.replace('left.authorization,', 'left.authorization.clone(),')
          text = text.replace('right.authorization,', 'right.authorization.clone(),')
          path.write_text(text)
          PY

      - name: Apply machine-safe Clippy fixes
        run: cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --quiet && exit 0
          git commit -m "Fix Windows Bridge test ownership and formatting"
          git push origin HEAD:agent/windows-bridge-protocol-v1
