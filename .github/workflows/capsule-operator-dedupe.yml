name: Capsule operator dedupe

on:
  pull_request:
    paths:
      - "professions/graphic-designer/profession.json"
      - ".github/workflows/capsule-operator-dedupe.yml"

permissions:
  contents: write

jobs:
  dedupe:
    if: github.head_ref == 'agent/inkscape-operator-expansion-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Deterministically remove duplicate operator identities
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("professions/graphic-designer/profession.json")
          capsule = json.loads(path.read_text(encoding="utf-8"))

          unique_operators = []
          seen = set()
          for operator in capsule["operators"]:
              operator_id = operator["id"]
              if operator_id in seen:
                  continue
              seen.add(operator_id)
              unique_operators.append(operator)
          capsule["operators"] = unique_operators

          for job_type in capsule["job_types"]:
              unique_ids = []
              seen_ids = set()
              for operator_id in job_type["operator_ids"]:
                  if operator_id in seen_ids:
                      continue
                  seen_ids.add(operator_id)
                  unique_ids.append(operator_id)
              job_type["operator_ids"] = unique_ids

          expected = {
              "inkscape.canvas.resize",
              "inkscape.layer.create",
              "inkscape.asset.place",
              "inkscape.text.create",
              "inkscape.color.set_fill",
              "inkscape.object.transform",
              "inkscape.object.align",
              "inkscape.object.distribute",
              "inkscape.document.save_svg",
              "inkscape.export.profiled",
          }
          actual = {item["id"] for item in capsule["operators"]}
          missing = expected - actual
          if missing:
              raise SystemExit(f"dedupe would leave missing operators: {sorted(missing)}")

          path.write_text(json.dumps(capsule, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit deduplicated capsule
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add professions/graphic-designer/profession.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Deduplicate Graphic Designer operator identities"
          git push origin HEAD:${{ github.head_ref }}
