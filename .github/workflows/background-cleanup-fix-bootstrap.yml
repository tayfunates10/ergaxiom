name: Background cleanup fix bootstrap

on:
  pull_request:
    paths:
      - ".github/workflows/background-cleanup-fix-bootstrap.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/background-cleanup-certified-path-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Fix plan ownership ordering
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/background-cleanup-certified-path-runtime/src/planner.rs')
          text = path.read_text(encoding='utf-8')
          old = '''    let compiled_plan = compile_plan(&plan, capsule_value, &compiled_contract)?;\n\n    Ok(BackgroundCleanupPlanOutcome::Planned {\n'''
          new = '''    let compiled_plan = compile_plan(&plan, capsule_value, &compiled_contract)?;\n    let mandatory_step_count = compiled_plan.mandatory_step_count();\n\n    Ok(BackgroundCleanupPlanOutcome::Planned {\n'''
          if old not in text:
              raise SystemExit('expected planner ownership block is missing')
          text = text.replace(old, new, 1)
          text = text.replace(
              '        mandatory_step_count: compiled_plan.mandatory_step_count(),\n',
              '        mandatory_step_count,\n',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
          cargo fmt --all

      - name: Commit verified fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/background-cleanup-certified-path-runtime/src/planner.rs
          git commit -m "Fix cleanup planner ownership ordering"
          git push origin HEAD:${{ github.head_ref }}
