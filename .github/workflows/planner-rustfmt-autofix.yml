name: Planner rustfmt autofix

on:
  push:
    branches:
      - agent/typed-planner-v1

permissions:
  contents: write

jobs:
  format-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out planner branch
        uses: actions/checkout@v4
        with:
          ref: agent/typed-planner-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - name: Format Rust workspace
        run: cargo fmt --all

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Remove one-shot workflow and push formatting
        run: |
          rm .github/workflows/planner-rustfmt-autofix.yml
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Apply planner rustfmt output [skip ci]"
          git push origin HEAD:agent/typed-planner-v1
