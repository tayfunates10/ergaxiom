name: Temporary fix sRGB certified delivery

on:
  push:
    branches:
      - agent/inkscape-srgb-certified-delivery-v1
    paths:
      - ".github/workflows/temp-fix-srgb-certified-delivery.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/inkscape-srgb-certified-delivery-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Remove unused evidence import
        shell: python
        run: |
          from pathlib import Path
          path = Path("crates/png-srgb-normalizer-runtime/src/evidence.rs")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "    SrgbSvgEvidence, inspect_svg_srgb,\n",
              "    inspect_svg_srgb,\n",
              1,
          )
          path.write_text(text, encoding="utf-8")

      - name: Apply machine-safe Clippy fixes
        run: >-
          cargo clippy --fix
          -p ergaxiom-png-srgb-normalizer-runtime
          -p ergaxiom-graphic-inkscape-srgb-certified-delivery-runtime
          --all-targets
          --all-features
          --allow-dirty
          --allow-staged

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit fixes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/png-srgb-normalizer-runtime crates/graphic-inkscape-srgb-certified-delivery-runtime
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Fix and format signed sRGB certification runtime"
          git push origin HEAD:agent/inkscape-srgb-certified-delivery-v1
