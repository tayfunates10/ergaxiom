name: Brand export test lint fix

on:
  pull_request:
    paths:
      - ".github/workflows/brand-export-test-lint-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/brand-compliant-export-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Scope test helper lint allowance
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/brand-compliant-export-certified-path-runtime/tests/path.rs')
          text = path.read_text(encoding='utf-8')
          needle = 'fn execution_record(\n'
          replacement = '#[allow(clippy::too_many_arguments)]\nfn execution_record(\n'
          if needle not in text:
              raise SystemExit('execution_record helper not found')
          path.write_text(text.replace(needle, replacement, 1), encoding='utf-8')
          PY
          cargo fmt --all
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/brand-compliant-export-certified-path-runtime/tests/path.rs
          git commit -m "Scope brand export test helper lint allowance"
          git push origin HEAD:${{ github.head_ref }}
