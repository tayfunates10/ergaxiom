name: Real final safe-area alignment fix

on:
  push:
    branches:
      - agent/real-final-artifact-ci-v1

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/real-final-artifact-ci-v1
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt

      - name: Align twin and real safe-area boundary
        shell: python
        run: |
          from pathlib import Path
          path = Path("crates/graphic-inkscape-final-certified-delivery-runtime/tests/real_final_certified_delivery.rs")
          text = path.read_text(encoding="utf-8")
          old = '''const TEXT_SAFE_AREA: TextRect = TextRect {
    x: 20,
    y: 110,
    width: 200,
    height: 60,
};'''
          new = '''const TEXT_SAFE_AREA: TextRect = TextRect {
    x: 20,
    y: 110,
    width: 200,
    height: 61,
};'''
          if old not in text:
              raise SystemExit("safe-area constant not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - run: cargo fmt --all

      - name: Remove workflow and push
        run: |
          rm .github/workflows/real-final-safe-area-fix.yml
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Align real and twin text safe area [skip ci]"
          git push origin HEAD:agent/real-final-artifact-ci-v1
