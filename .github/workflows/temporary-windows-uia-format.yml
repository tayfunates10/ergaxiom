name: Temporary Windows UIA cleanup

on:
  push:
    branches:
      - agent/windows-uia-host-v1

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/windows-uia-host-v1
          fetch-depth: 0

      - name: Remove generated files and temporary workflow
        run: |
          set -euo pipefail
          printf 'bin/\nobj/\n' > hosts/windows-uia/.gitignore
          git rm -r --ignore-unmatch hosts/windows-uia/obj
          git rm .github/workflows/temporary-windows-uia-format.yml

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hosts/windows-uia/.gitignore
          git commit -m "Remove generated Windows host files"
          git push origin HEAD:agent/windows-uia-host-v1
