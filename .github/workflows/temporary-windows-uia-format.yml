name: Temporary Windows UIA format

on:
  push:
    branches:
      - agent/windows-uia-host-v1

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/windows-uia-host-v1
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore host
        run: dotnet restore hosts/windows-uia/Ergaxiom.WindowsUiaHost.csproj

      - name: Format host
        run: dotnet format hosts/windows-uia/Ergaxiom.WindowsUiaHost.csproj --no-restore

      - name: Commit formatting
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hosts/windows-uia
          if (git diff --cached --quiet) {
            exit 0
          }
          git commit -m "Format Windows UI Automation host"
          git push origin HEAD:agent/windows-uia-host-v1
