name: Background cleanup signed evidence wiring

on:
  pull_request:
    paths:
      - "tools/patch_cleanup_signed_evidence.py"
      - ".github/workflows/background-cleanup-signature-wiring.yml"

permissions:
  contents: write

jobs:
  wire:
    if: github.head_ref == 'agent/background-cleanup-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply and format signed evidence wiring
        run: |
          set -euo pipefail
          python tools/patch_cleanup_signed_evidence.py
          cargo fmt --all

      - name: Commit signed evidence wiring
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/background-cleanup-certified-path-runtime/src/certify.rs \
            crates/background-cleanup-certified-path-runtime/tests/real_certificate.rs
          git commit -m "Require signed cleanup execution evidence"
          git push origin HEAD:${{ github.head_ref }}
