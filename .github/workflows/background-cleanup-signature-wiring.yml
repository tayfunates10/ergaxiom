name: Background cleanup signed evidence wiring

on:
  push:
    branches:
      - agent/background-cleanup-certified-path-v1
    paths:
      - ".github/workflows/background-cleanup-signature-wiring.yml"

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/background-cleanup-certified-path-v1
          fetch-depth: 0

      - name: Require signed executor and Inkscape evidence
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/wire.py
          python /tmp/wire.py
          cargo fmt --all

      - name: Commit signed evidence wiring
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/background-cleanup-certified-path-runtime/src/certify.rs \
            crates/background-cleanup-certified-path-runtime/tests/real_certificate.rs
          git commit -m "Require signed cleanup execution evidence"
          git push origin HEAD:agent/background-cleanup-certified-path-v1
