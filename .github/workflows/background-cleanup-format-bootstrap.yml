name: Background cleanup formatting bootstrap

on:
  pull_request:
    paths:
      - ".github/workflows/background-cleanup-format-bootstrap.yml"
      - "crates/background-cleanup-certified-path-runtime/**"

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/background-cleanup-certified-path-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format background cleanup runtime
        run: cargo fmt --all

      - name: Commit formatter output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/background-cleanup-certified-path-runtime Cargo.toml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format background cleanup certified path"
          git push origin HEAD:${{ github.head_ref }}
