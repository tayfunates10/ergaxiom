name: Background cleanup platform binding fix

on:
  push:
    branches:
      - agent/background-cleanup-certified-path-v1
    paths:
      - ".github/workflows/background-cleanup-platform-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/background-cleanup-certified-path-v1
          fetch-depth: 0

      - name: Bind certificate evidence to actual platform
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          compiler = Path('crates/background-cleanup-certified-path-runtime/src/compiler.rs')
          text = compiler.read_text(encoding='utf-8')
          old = '            "os": "windows",\n'
          if old not in text:
              raise SystemExit('compiler OS field is missing')
          compiler.write_text(text.replace(old, '            "os": null,\n', 1), encoding='utf-8')

          certify = Path('crates/background-cleanup-certified-path-runtime/src/certify.rs')
          text = certify.read_text(encoding='utf-8')
          old = "    pub kernel_version: &'a str,\n"
          new = "    pub operating_system: &'a str,\n    pub kernel_version: &'a str,\n"
          if old not in text:
              raise SystemExit('certification request kernel field is missing')
          text = text.replace(old, new, 1)
          old = '        ("kernel_version", request.kernel_version),\n'
          new = '        ("operating_system", request.operating_system),\n        ("kernel_version", request.kernel_version),\n'
          if old not in text:
              raise SystemExit('certification required-fields block is missing')
          text = text.replace(old, new, 1)
          old = '            os: "windows".to_owned(),\n'
          new = '            os: request.operating_system.to_owned(),\n'
          if old not in text:
              raise SystemExit('evidence OS field is missing')
          certify.write_text(text.replace(old, new, 1), encoding='utf-8')

          real_test = Path('crates/background-cleanup-certified-path-runtime/tests/real_certificate.rs')
          text = real_test.read_text(encoding='utf-8')
          old = '        kernel_version: "github-actions-ubuntu-24.04",\n'
          new = '        operating_system: "linux",\n        kernel_version: "github-actions-ubuntu-24.04",\n'
          if old not in text:
              raise SystemExit('real certificate kernel fixture is missing')
          real_test.write_text(text.replace(old, new, 1), encoding='utf-8')

          example = Path('examples/work-contracts/image-background-cleanup.json')
          contract = json.loads(example.read_text(encoding='utf-8'))
          contract['environment']['os'] = None
          example.write_text(json.dumps(contract, indent=2) + '\n', encoding='utf-8')
          PY
          cargo fmt --all

      - name: Commit platform binding
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/background-cleanup-certified-path-runtime/src/compiler.rs \
            crates/background-cleanup-certified-path-runtime/src/certify.rs \
            crates/background-cleanup-certified-path-runtime/tests/real_certificate.rs \
            examples/work-contracts/image-background-cleanup.json
          git commit -m "Bind cleanup certificate to the actual operating system"
          git push origin HEAD:agent/background-cleanup-certified-path-v1
