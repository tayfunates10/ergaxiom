name: Foundation validation

on:
  push:
    branches:
      - main
      - agent/**
    paths:
      - "schemas/**"
      - "professions/**"
      - "examples/work-contracts/**"
      - "tools/validate_foundation.py"
      - "requirements-dev.txt"
      - ".github/workflows/foundation-validation.yml"
  pull_request:
    paths:
      - "schemas/**"
      - "professions/**"
      - "examples/work-contracts/**"
      - "tools/validate_foundation.py"
      - "requirements-dev.txt"
      - ".github/workflows/foundation-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate contracts and capsule links
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Validate Phase 0 foundation
        run: python tools/validate_foundation.py
