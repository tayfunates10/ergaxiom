name: Foundation validation

on:
  push:
    branches:
      - main
      - agent/**
    paths:
      - "schemas/**"
      - "professions/**"
      - "examples/work-contracts/**"
      - "tools/validate_foundation.py"
      - "tools/validate_schema_catalog.py"
      - "requirements-dev.txt"
      - ".github/workflows/foundation-validation.yml"
  pull_request:
    paths:
      - "schemas/**"
      - "professions/**"
      - "examples/work-contracts/**"
      - "tools/validate_foundation.py"
      - "tools/validate_schema_catalog.py"
      - "requirements-dev.txt"
      - ".github/workflows/foundation-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate schemas, contracts and capsule links
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Validate schema catalog
        run: python tools/validate_schema_catalog.py

      - name: Validate Phase 0 foundation
        shell: bash
        run: |
          set -o pipefail
          python tools/validate_foundation.py 2>&1 | tee "$RUNNER_TEMP/foundation-validation.log"

      - name: Upload foundation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-validation-diagnostics
          path: ${{ runner.temp }}/foundation-validation.log
          if-no-files-found: warn
          retention-days: 7
