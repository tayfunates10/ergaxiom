name: Temporary export normalization evidence

on:
  push:
    branches:
      - agent/inkscape-srgb-certified-delivery-v1
    paths:
      - ".github/workflows/temp-export-normalization-evidence.yml"

permissions:
  contents: write

jobs:
  export-module:
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/inkscape-srgb-certified-delivery-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Export evidence module
        shell: python
        run: |
          from pathlib import Path
          path = Path("crates/png-srgb-normalizer-runtime/src/lib.rs")
          text = path.read_text(encoding="utf-8")
          marker = "#![forbid(unsafe_code)]\n"
          export = "#![forbid(unsafe_code)]\n\nmod evidence;\npub use evidence::*;\n"
          if "mod evidence;" not in text:
              if not text.startswith(marker):
                  raise SystemExit("crate header not found")
              text = export + text[len(marker):].lstrip("\n")
              path.write_text(text, encoding="utf-8")

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit module export
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/png-srgb-normalizer-runtime/src/lib.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Export signed normalization evidence API"
          git push origin HEAD:agent/inkscape-srgb-certified-delivery-v1
