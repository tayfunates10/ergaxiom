name: Brand export bootstrap cleanup

on:
  pull_request:
    paths:
      - ".github/workflows/brand-export-bootstrap.yml"

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/brand-compliant-export-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove one-time payload material
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git rm -r tools/brand-export-bootstrap-payload tools/brand-export-bootstrap-script
          git commit -m "Remove brand export bootstrap payload"
          git push origin HEAD:${{ github.head_ref }}
