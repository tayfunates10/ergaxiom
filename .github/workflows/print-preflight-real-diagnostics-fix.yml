name: Print preflight real diagnostics fix

on:
  pull_request:
    paths:
      - ".github/workflows/print-preflight-real-diagnostics-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/print-ready-poster-preflight-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Improve real certificate assertion diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/print-ready-poster-preflight-certified-path-runtime/tests/real_certificate.rs')
          text = path.read_text(encoding='utf-8')
          old = '    assert!(validation.accepted);\n'
          new = '    assert!(validation.accepted, "print preflight validation rejected: {validation:#?}");\n'
          if old not in text:
              raise SystemExit('validation assertion not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/print-ready-poster-preflight-certified-path-runtime/tests/real_certificate.rs
          git diff --cached --check
          git commit -m "Improve real print preflight diagnostics"
          git push origin HEAD:${{ github.head_ref }}
