name: Inkscape adapter

on:
  pull_request:
    paths:
      - "tools/patch_real_final_altered_logo.py"
      - ".github/workflows/inkscape-adapter.yml"

permissions:
  contents: write

jobs:
  apply-altered-logo-correction:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/real-final-artifact-ci-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Patch and push altered-logo correction
        shell: bash
        run: |
          set -euo pipefail
          python tools/patch_real_final_altered_logo.py
          cargo fmt --all
          target='crates/graphic-inkscape-final-certified-delivery-runtime/tests/real_final_certified_delivery.rs'
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add "$target"
          git commit -m "Normalize altered-logo attack fixture profiles"
          git push origin HEAD:agent/real-final-artifact-ci-v1
