name: Inkscape adapter

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/graphic-final-artifact-verification-runtime/**"
      - "crates/graphic-inkscape-certified-delivery-runtime/**"
      - "crates/graphic-inkscape-final-certified-delivery-runtime/**"
      - "crates/graphic-inkscape-srgb-certified-delivery-runtime/**"
      - "crates/inkscape-adapter-runtime/**"
      - "crates/inkscape-execution-evidence-runtime/**"
      - "crates/png-artifact-validator-runtime/**"
      - "crates/png-logo-geometry-runtime/**"
      - "crates/png-pixel-decoder-runtime/**"
      - "crates/png-rendered-contrast-runtime/**"
      - "crates/png-rendered-text-bounds-runtime/**"
      - "crates/png-srgb-normalizer-runtime/**"
      - "crates/svg-approved-copy-runtime/**"
      - "fixtures/inkscape/**"
      - "professions/graphic-designer/adapters/**"
      - "docs/architecture/**"
      - ".github/workflows/inkscape-adapter.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/graphic-final-artifact-verification-runtime/**"
      - "crates/graphic-inkscape-certified-delivery-runtime/**"
      - "crates/graphic-inkscape-final-certified-delivery-runtime/**"
      - "crates/graphic-inkscape-srgb-certified-delivery-runtime/**"
      - "crates/inkscape-adapter-runtime/**"
      - "crates/inkscape-execution-evidence-runtime/**"
      - "crates/png-artifact-validator-runtime/**"
      - "crates/png-logo-geometry-runtime/**"
      - "crates/png-pixel-decoder-runtime/**"
      - "crates/png-rendered-contrast-runtime/**"
      - "crates/png-rendered-text-bounds-runtime/**"
      - "crates/png-srgb-normalizer-runtime/**"
      - "crates/svg-approved-copy-runtime/**"
      - "fixtures/inkscape/**"
      - "professions/graphic-designer/adapters/**"
      - "docs/architecture/**"
      - ".github/workflows/inkscape-adapter.yml"

permissions:
  contents: write

jobs:
  verify-document-model-real-export-and-certification:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply pending safe-area source correction
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/real-final-artifact-ci-v1'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.head_ref }}"
          git checkout -B "${{ github.head_ref }}" "origin/${{ github.head_ref }}"
          perl -0pi -e 's/    height: 60,\n};\nconst LOGO_REGION/    height: 61,\n};\nconst LOGO_REGION/' crates/graphic-inkscape-final-certified-delivery-runtime/tests/real_final_certified_delivery.rs
          grep -A5 'const TEXT_SAFE_AREA' crates/graphic-inkscape-final-certified-delivery-runtime/tests/real_final_certified_delivery.rs | grep 'height: 61'
          git checkout HEAD^ -- .github/workflows/inkscape-adapter.yml
          rm -f .github/workflows/real-final-safe-area-fix.yml
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Align real and twin text safe area"
          git push origin HEAD:"${{ github.head_ref }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Inkscape
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends inkscape
          inkscape --version

      - name: Bind trusted Inkscape executable
        shell: bash
        run: |
          set -euo pipefail
          executable="$(command -v inkscape)"
          digest="$(sha256sum "$executable" | awk '{print $1}')"
          echo "ERGAXIOM_INKSCAPE=$executable" >> "$GITHUB_ENV"
          echo "ERGAXIOM_INKSCAPE_SHA256=$digest" >> "$GITHUB_ENV"
          echo "Trusted Inkscape SHA-256: $digest"

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run adapter Clippy
        run: cargo clippy -p ergaxiom-inkscape-adapter-runtime --all-targets --all-features -- -D warnings

      - name: Run certified-delivery and final-validator Clippy
        run: >-
          cargo clippy
          -p ergaxiom-inkscape-execution-evidence-runtime
          -p ergaxiom-graphic-inkscape-certified-delivery-runtime
          -p ergaxiom-graphic-inkscape-srgb-certified-delivery-runtime
          -p ergaxiom-graphic-final-artifact-verification-runtime
          -p ergaxiom-graphic-inkscape-final-certified-delivery-runtime
          -p ergaxiom-png-artifact-validator-runtime
          -p ergaxiom-png-pixel-decoder-runtime
          -p ergaxiom-png-logo-geometry-runtime
          -p ergaxiom-png-rendered-text-bounds-runtime
          -p ergaxiom-png-rendered-contrast-runtime
          -p ergaxiom-png-srgb-normalizer-runtime
          -p ergaxiom-svg-approved-copy-runtime
          --all-targets
          --all-features
          -- -D warnings

      - name: Run deterministic document-model tests
        run: cargo test -p ergaxiom-inkscape-adapter-runtime

      - name: Run signed execution evidence tests
        run: cargo test -p ergaxiom-inkscape-execution-evidence-runtime

      - name: Run deterministic certified-delivery tests
        run: cargo test -p ergaxiom-graphic-inkscape-certified-delivery-runtime

      - name: Run deterministic sRGB final-certification tests
        run: cargo test -p ergaxiom-graphic-inkscape-srgb-certified-delivery-runtime

      - name: Run deterministic final-artifact binding tests
        run: cargo test -p ergaxiom-graphic-final-artifact-verification-runtime

      - name: Run deterministic final certified-delivery tests
        run: cargo test -p ergaxiom-graphic-inkscape-final-certified-delivery-runtime

      - name: Run deterministic PNG validator tests
        run: cargo test -p ergaxiom-png-artifact-validator-runtime

      - name: Run deterministic PNG pixel-decoder tests
        run: cargo test -p ergaxiom-png-pixel-decoder-runtime

      - name: Run deterministic logo-geometry tests
        run: cargo test -p ergaxiom-png-logo-geometry-runtime

      - name: Run deterministic rendered-text-bounds tests
        run: cargo test -p ergaxiom-png-rendered-text-bounds-runtime

      - name: Run deterministic rendered-contrast tests
        run: cargo test -p ergaxiom-png-rendered-contrast-runtime

      - name: Run deterministic approved-copy tests
        run: cargo test -p ergaxiom-svg-approved-copy-runtime

      - name: Run deterministic sRGB normalizer tests
        run: cargo test -p ergaxiom-png-srgb-normalizer-runtime

      - name: Run real Inkscape edit and export test
        run: >-
          cargo test
          -p ergaxiom-inkscape-adapter-runtime
          --features real-inkscape-tests
          --test real_inkscape
          -- --nocapture

      - name: Run real Inkscape certified delivery test
        run: >-
          cargo test
          -p ergaxiom-graphic-inkscape-certified-delivery-runtime
          --features real-inkscape-certified-delivery-tests
          --test certified_inkscape_delivery
          real_inkscape_execution_produces_final_attestation
          -- --nocapture

      - name: Run real Inkscape PNG validator test
        shell: bash
        run: |
          set -o pipefail
          cargo test \
            -p ergaxiom-png-artifact-validator-runtime \
            --features real-inkscape-tests \
            --test real_inkscape_png \
            -- --nocapture 2>&1 | tee "$RUNNER_TEMP/real-inkscape-png-validator.log"

      - name: Run real Inkscape sRGB normalization test
        shell: bash
        run: |
          set -o pipefail
          cargo test \
            -p ergaxiom-png-srgb-normalizer-runtime \
            --features real-inkscape-tests \
            --test real_inkscape_normalization \
            -- --nocapture 2>&1 | tee "$RUNNER_TEMP/real-inkscape-srgb-normalization.log"

      - name: Run real Inkscape PNG pixel-decoder equivalence test
        shell: bash
        run: |
          set -o pipefail
          cargo test \
            -p ergaxiom-png-pixel-decoder-runtime \
            --features real-inkscape-tests \
            --test real_inkscape_pixels \
            -- --nocapture 2>&1 | tee "$RUNNER_TEMP/real-inkscape-pixel-decoder.log"

      - name: Run real Inkscape rendered-contrast test
        shell: bash
        run: |
          set -o pipefail
          cargo test \
            -p ergaxiom-png-rendered-contrast-runtime \
            --features real-inkscape-tests \
            --test real_inkscape_contrast \
            -- --nocapture 2>&1 | tee "$RUNNER_TEMP/real-inkscape-rendered-contrast.log"

      - name: Run real Inkscape sRGB final-attestation test
        shell: bash
        run: |
          set -o pipefail
          cargo test \
            -p ergaxiom-graphic-inkscape-srgb-certified-delivery-runtime \
            --features real-inkscape-tests \
            --test certified_srgb_delivery \
            real_inkscape_srgb_execution_produces_final_attestation \
            -- --nocapture 2>&1 | tee "$RUNNER_TEMP/real-inkscape-srgb-final-attestation.log"

      - name: Run complete real final-artifact certificate test
        shell: bash
        env:
          ERGAXIOM_FINAL_EVIDENCE_DIR: ${{ runner.temp }}/real-final-artifact-evidence
        run: |
          set -o pipefail
          cargo test \
            -p ergaxiom-graphic-inkscape-final-certified-delivery-runtime \
            --features real-inkscape-tests \
            --test real_final_certified_delivery \
            real_inkscape_artifacts_issue_final_acceptance_certificate \
            -- --nocapture 2>&1 | tee "$RUNNER_TEMP/real-final-artifact-certificate.log"

      - name: Upload real rendered and final-certificate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-inkscape-final-artifact-evidence
          path: |
            ${{ runner.temp }}/real-inkscape-png-validator.log
            ${{ runner.temp }}/real-inkscape-srgb-normalization.log
            ${{ runner.temp }}/real-inkscape-pixel-decoder.log
            ${{ runner.temp }}/real-inkscape-rendered-contrast.log
            ${{ runner.temp }}/real-inkscape-srgb-final-attestation.log
            ${{ runner.temp }}/real-final-artifact-certificate.log
            ${{ runner.temp }}/real-final-artifact-evidence/**
          if-no-files-found: error
          retention-days: 7
