name: Inkscape adapter

on:
  pull_request:
    paths:
      - "tools/patch_real_final_stage_context.py"
      - ".github/workflows/inkscape-adapter.yml"

permissions:
  contents: write

jobs:
  apply-final-stage-context:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/real-final-artifact-ci-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Patch and push stage contexts
        shell: bash
        run: |
          set -euo pipefail
          python tools/patch_real_final_stage_context.py
          cargo fmt --all
          target='crates/graphic-inkscape-final-certified-delivery-runtime/tests/real_final_certified_delivery.rs'
          if git diff --quiet -- "$target"; then
            echo 'Final stage contexts are already applied.'
            exit 0
          fi
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add "$target"
          git commit -m "Identify final certification stage failures"
          git push origin HEAD:agent/real-final-artifact-ci-v1
