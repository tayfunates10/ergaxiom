name: Inkscape adapter

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/graphic-inkscape-certified-delivery-runtime/**"
      - "crates/inkscape-adapter-runtime/**"
      - "crates/inkscape-execution-evidence-runtime/**"
      - "crates/png-artifact-validator-runtime/**"
      - "fixtures/inkscape/**"
      - "professions/graphic-designer/adapters/**"
      - "docs/architecture/19-inkscape-adapter.md"
      - "docs/architecture/20-inkscape-certified-delivery.md"
      - "docs/architecture/21-real-inkscape-certified-delivery.md"
      - "docs/architecture/22-png-artifact-validator.md"
      - ".github/workflows/inkscape-adapter.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/graphic-inkscape-certified-delivery-runtime/**"
      - "crates/inkscape-adapter-runtime/**"
      - "crates/inkscape-execution-evidence-runtime/**"
      - "crates/png-artifact-validator-runtime/**"
      - "fixtures/inkscape/**"
      - "professions/graphic-designer/adapters/**"
      - "docs/architecture/19-inkscape-adapter.md"
      - "docs/architecture/20-inkscape-certified-delivery.md"
      - "docs/architecture/21-real-inkscape-certified-delivery.md"
      - "docs/architecture/22-png-artifact-validator.md"
      - ".github/workflows/inkscape-adapter.yml"

permissions:
  contents: read

jobs:
  verify-document-model-real-export-and-certification:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Inkscape
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends inkscape
          inkscape --version

      - name: Bind trusted Inkscape executable
        shell: bash
        run: |
          set -euo pipefail
          executable="$(command -v inkscape)"
          digest="$(sha256sum "$executable" | awk '{print $1}')"
          echo "ERGAXIOM_INKSCAPE=$executable" >> "$GITHUB_ENV"
          echo "ERGAXIOM_INKSCAPE_SHA256=$digest" >> "$GITHUB_ENV"
          echo "Trusted Inkscape SHA-256: $digest"

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run adapter Clippy
        run: cargo clippy -p ergaxiom-inkscape-adapter-runtime --all-targets --all-features -- -D warnings

      - name: Run certified-delivery and PNG validator Clippy
        run: >-
          cargo clippy
          -p ergaxiom-inkscape-execution-evidence-runtime
          -p ergaxiom-graphic-inkscape-certified-delivery-runtime
          -p ergaxiom-png-artifact-validator-runtime
          --all-targets
          --all-features
          -- -D warnings

      - name: Run deterministic document-model tests
        run: cargo test -p ergaxiom-inkscape-adapter-runtime

      - name: Run signed execution evidence tests
        run: cargo test -p ergaxiom-inkscape-execution-evidence-runtime

      - name: Run deterministic certified-delivery tests
        run: cargo test -p ergaxiom-graphic-inkscape-certified-delivery-runtime

      - name: Run deterministic PNG validator tests
        run: cargo test -p ergaxiom-png-artifact-validator-runtime

      - name: Run real Inkscape edit and export test
        run: >-
          cargo test
          -p ergaxiom-inkscape-adapter-runtime
          --features real-inkscape-tests
          --test real_inkscape
          -- --nocapture

      - name: Run real Inkscape certified delivery test
        run: >-
          cargo test
          -p ergaxiom-graphic-inkscape-certified-delivery-runtime
          --features real-inkscape-certified-delivery-tests
          --test certified_inkscape_delivery
          real_inkscape_execution_produces_final_attestation
          -- --nocapture

      - name: Run real Inkscape PNG validator test
        shell: bash
        run: |
          set -o pipefail
          cargo test \
            -p ergaxiom-png-artifact-validator-runtime \
            --features real-inkscape-tests \
            --test real_inkscape_png \
            -- --nocapture 2>&1 | tee "$RUNNER_TEMP/real-inkscape-png-validator.log"

      - name: Upload real PNG validator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-inkscape-png-validator-log
          path: ${{ runner.temp }}/real-inkscape-png-validator.log
          if-no-files-found: error
          retention-days: 1
