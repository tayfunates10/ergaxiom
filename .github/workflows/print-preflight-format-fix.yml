name: Print preflight rustfmt fix

on:
  pull_request:
    paths:
      - ".github/workflows/print-preflight-format-fix.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/print-ready-poster-preflight-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format and commit
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/print-ready-poster-preflight-certified-path-runtime
          git diff --cached --check
          git commit -m "Format real print preflight diagnostics"
          git push origin HEAD:${{ github.head_ref }}
