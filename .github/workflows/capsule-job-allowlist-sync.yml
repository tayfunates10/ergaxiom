name: Capsule job allowlist sync

on:
  pull_request:
    paths:
      - "professions/graphic-designer/profession.json"
      - ".github/workflows/capsule-job-allowlist-sync.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/inkscape-operator-expansion-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Preserve the certified static-post operator profile
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("professions/graphic-designer/profession.json")
          capsule = json.loads(path.read_text(encoding="utf-8"))
          certified_profile = [
              "design.create_canvas",
              "design.place_asset",
              "design.compose_text",
              "design.export_raster",
          ]
          matched = False
          for job_type in capsule["job_types"]:
              if job_type["id"] == "social_media_static_post":
                  job_type["operator_ids"] = certified_profile
                  matched = True
          if not matched:
              raise SystemExit("social_media_static_post job type is missing")

          expanded = {
              "inkscape.canvas.resize",
              "inkscape.layer.create",
              "inkscape.asset.place",
              "inkscape.text.create",
              "inkscape.color.set_fill",
              "inkscape.object.transform",
              "inkscape.object.align",
              "inkscape.object.distribute",
              "inkscape.document.save_svg",
              "inkscape.export.profiled",
          }
          capsule_operator_ids = {item["id"] for item in capsule["operators"]}
          missing = expanded - capsule_operator_ids
          if missing:
              raise SystemExit(f"expanded capsule operators are missing: {sorted(missing)}")

          path.write_text(json.dumps(capsule, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit synchronized allowlist
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add professions/graphic-designer/profession.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Preserve the certified static-post operator allowlist"
          git push origin HEAD:${{ github.head_ref }}
