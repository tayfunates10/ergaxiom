name: Desktop lock bootstrap

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "crates/desktop-shell-runtime/**"
      - "Cargo.toml"
      - ".github/workflows/desktop-lock-bootstrap.yml"

permissions:
  contents: write

jobs:
  generate-locks-and-format:
    if: github.head_ref == 'agent/desktop-shell-foundation-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out desktop branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Fix test import and format Rust
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("apps/desktop/src-tauri/src/pipeline.rs")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              ".and_then(Value::as_bool),",
              ".and_then(serde_json::Value::as_bool),",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY
          cargo fmt --all
          cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --all

      - name: Generate pinned frontend lockfile
        working-directory: apps/desktop
        run: npm install --package-lock-only --ignore-scripts

      - name: Generate pinned Tauri lockfile
        working-directory: apps/desktop/src-tauri
        run: cargo generate-lockfile

      - name: Commit generated lockfiles and formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add Cargo.toml crates/desktop-shell-runtime apps/desktop/package-lock.json apps/desktop/src-tauri/src apps/desktop/src-tauri/Cargo.toml
          git add -f apps/desktop/src-tauri/Cargo.lock
          if git diff --cached --quiet; then
            echo "No bootstrap changes were needed."
            exit 0
          fi
          git commit -m "Generate desktop lockfiles and format sources"
          git push origin HEAD:${{ github.head_ref }}

# One-shot bootstrap: remove after the generated files are committed.
