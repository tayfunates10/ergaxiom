name: Desktop lock bootstrap

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "crates/desktop-shell-runtime/**"
      - "Cargo.toml"
      - ".github/workflows/desktop-lock-bootstrap.yml"

permissions:
  contents: read

jobs:
  generate-locks-and-format:
    if: github.head_ref == 'agent/desktop-shell-foundation-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out desktop branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Fix test import and format Rust
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("apps/desktop/src-tauri/src/pipeline.rs")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              ".and_then(Value::as_bool),",
              ".and_then(serde_json::Value::as_bool),",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY
          cargo fmt --all
          cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --all

      - name: Generate pinned frontend lockfile
        working-directory: apps/desktop
        run: npm install --package-lock-only --ignore-scripts

      - name: Generate pinned Tauri lockfile
        working-directory: apps/desktop/src-tauri
        run: cargo generate-lockfile

      - name: Assemble bootstrap output
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/desktop-bootstrap/apps/desktop/src-tauri/src"
          mkdir -p "$RUNNER_TEMP/desktop-bootstrap/crates/desktop-shell-runtime/src"
          mkdir -p "$RUNNER_TEMP/desktop-bootstrap/crates/desktop-shell-runtime/tests"
          cp apps/desktop/package-lock.json "$RUNNER_TEMP/desktop-bootstrap/apps/desktop/package-lock.json"
          cp apps/desktop/src-tauri/Cargo.lock "$RUNNER_TEMP/desktop-bootstrap/apps/desktop/src-tauri/Cargo.lock"
          cp apps/desktop/src-tauri/src/*.rs "$RUNNER_TEMP/desktop-bootstrap/apps/desktop/src-tauri/src/"
          cp crates/desktop-shell-runtime/src/*.rs "$RUNNER_TEMP/desktop-bootstrap/crates/desktop-shell-runtime/src/"
          cp crates/desktop-shell-runtime/tests/*.rs "$RUNNER_TEMP/desktop-bootstrap/crates/desktop-shell-runtime/tests/"
          git diff -- Cargo.toml apps/desktop/src-tauri crates/desktop-shell-runtime > "$RUNNER_TEMP/desktop-bootstrap/format.patch"

      - name: Upload deterministic bootstrap output
        uses: actions/upload-artifact@v4
        with:
          name: desktop-locks-and-formatted-sources
          path: ${{ runner.temp }}/desktop-bootstrap/**
          if-no-files-found: error
          retention-days: 1

# One-shot bootstrap: remove after the generated files are committed.
