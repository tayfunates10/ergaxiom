name: Temporary fix sRGB test layout

on:
  push:
    branches:
      - agent/inkscape-srgb-certified-delivery-v1
    paths:
      - ".github/workflows/temp-fix-srgb-test-layout.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/inkscape-srgb-certified-delivery-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Move support module and remove unused import
        run: |
          set -euo pipefail
          mkdir -p crates/graphic-inkscape-srgb-certified-delivery-runtime/tests/support
          mv \
            crates/graphic-inkscape-srgb-certified-delivery-runtime/tests/support.rs \
            crates/graphic-inkscape-srgb-certified-delivery-runtime/tests/support/mod.rs
          python - <<'PY'
          from pathlib import Path
          path = Path("crates/graphic-inkscape-srgb-certified-delivery-runtime/tests/certified_srgb_delivery.rs")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "    ATTESTATION_ISSUER, ATTESTATION_KEY_ID, NOW, attestation_keys, authorizer, base_request,\n",
              "    ATTESTATION_ISSUER, ATTESTATION_KEY_ID, NOW, attestation_keys, authorizer,\n",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit test-layout fix
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A crates/graphic-inkscape-srgb-certified-delivery-runtime/tests
          git commit -m "Fix and format sRGB certification test layout"
          git push origin HEAD:agent/inkscape-srgb-certified-delivery-v1
