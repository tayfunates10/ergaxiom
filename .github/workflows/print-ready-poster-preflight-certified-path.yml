name: Print-ready poster preflight certified path

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/print-ready-poster-preflight-certified-path-runtime/**"
      - "professions/graphic-designer/profession.json"
      - "examples/work-contracts/**"
      - "docs/architecture/39-print-ready-poster-preflight-certified-path.md"
      - "docs/status.md"
      - ".github/workflows/print-ready-poster-preflight-certified-path.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/print-ready-poster-preflight-certified-path-runtime/**"
      - "professions/graphic-designer/profession.json"
      - "examples/work-contracts/**"
      - "docs/architecture/39-print-ready-poster-preflight-certified-path.md"
      - "docs/status.md"
      - ".github/workflows/print-ready-poster-preflight-certified-path.yml"

permissions:
  contents: read

jobs:
  verify-print-preflight-certificate:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Install and bind Inkscape
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends inkscape fonts-dejavu-core
          executable="$(command -v inkscape)"
          digest="$(sha256sum "$executable" | awk '{print $1}')"
          echo "ERGAXIOM_INKSCAPE=$executable" >> "$GITHUB_ENV"
          echo "ERGAXIOM_INKSCAPE_SHA256=$digest" >> "$GITHUB_ENV"
          inkscape --version

      - name: Validate schemas capsule and normative contracts
        shell: bash
        run: |
          set -euo pipefail
          python tools/validate_schema_catalog.py 2>&1 | tee foundation-diagnostics.log
          python tools/validate_foundation.py 2>&1 | tee -a foundation-diagnostics.log
          python - <<'PY' 2>&1 | tee -a foundation-diagnostics.log
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator, FormatChecker

          root = Path('.')
          capsule = json.loads((root / 'professions/graphic-designer/profession.json').read_text(encoding='utf-8'))
          contract = json.loads((root / 'examples/work-contracts/print-ready-poster-preflight.json').read_text(encoding='utf-8'))
          schema = json.loads((root / 'schemas/work-contract.schema.json').read_text(encoding='utf-8'))
          Draft202012Validator(schema, format_checker=FormatChecker()).validate(contract)
          if capsule['version'] != '0.6.0':
              raise SystemExit('Graphic Designer capsule must be 0.6.0')
          jobs = {item['id']: item for item in capsule['job_types']}
          expected_operators = [
              'print.validate_source',
              'print.export_pdf_with_inkscape',
              'print.certify_preflight',
          ]
          job = jobs['print_ready_poster_preflight']
          if job['operator_ids'] != expected_operators:
              raise SystemExit('print preflight operator allowlist changed')
          if len(job['required_constraints']) != 18:
              raise SystemExit('print preflight requires exactly 18 constraints')
          operators = {item['id']: item for item in capsule['operators']}
          for operator_id in expected_operators:
              item = operators[operator_id]
              if item['version'] != '0.1.0' or not item.get('deterministic'):
                  raise SystemExit(f'untrusted print operator: {operator_id}')
              if not item.get('rollback', {}).get('supported'):
                  raise SystemExit(f'print operator lacks rollback: {operator_id}')
          expected_validators = {
              'print.svg.structure', 'print.canvas.dimensions', 'print.bleed.coverage',
              'print.safe_area.geometry', 'print.palette.allowlist', 'print.pdf.vector_only',
              'print.pdf.fonts_outlined', 'print.pdf.page', 'print.pdf.boxes',
              'print.pdf.version', 'print.pdf.color_spaces', 'print.pdf.transparency',
              'print.pdf.security', 'print.source.immutability', 'print.inkscape.integration',
          }
          actual_validators = {item['id'] for item in capsule['validators']}
          if not expected_validators.issubset(actual_validators):
              raise SystemExit(f'missing print validators: {sorted(expected_validators - actual_validators)}')
          if contract['profession']['capsule_version'] != capsule['version']:
              raise SystemExit('print contract capsule mismatch')
          if contract['job_type'] != 'print_ready_poster_preflight':
              raise SystemExit('print contract job type mismatch')
          if len(contract['proof_obligations']) != 18:
              raise SystemExit('print contract must contain 18 proof obligations')
          print('PRINT PREFLIGHT FOUNDATION PASSED')
          PY

      - name: Check workspace formatting
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check 2>&1 | tee rustfmt-diagnostics.log

      - name: Lint certified path
        shell: bash
        run: |
          set -euo pipefail
          cargo clippy \
            -p ergaxiom-print-ready-poster-preflight-certified-path-runtime \
            --all-targets \
            --all-features \
            -- -D warnings \
            2>&1 | tee clippy-diagnostics.log

      - name: Run deterministic and adversarial fixtures
        shell: bash
        run: |
          set -euo pipefail
          cargo test \
            -p ergaxiom-print-ready-poster-preflight-certified-path-runtime \
            2>&1 | tee deterministic-test-diagnostics.log

      - name: Run real Inkscape Acceptance Certificate regression
        shell: bash
        run: |
          set -euo pipefail
          cargo test \
            -p ergaxiom-print-ready-poster-preflight-certified-path-runtime \
            --features real-inkscape-tests \
            --test real_certificate \
            -- --nocapture \
            2>&1 | tee real-certificate-diagnostics.log

      - name: Upload certification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: print-ready-poster-preflight-certification-diagnostics
          path: |
            foundation-diagnostics.log
            rustfmt-diagnostics.log
            clippy-diagnostics.log
            deterministic-test-diagnostics.log
            real-certificate-diagnostics.log
          if-no-files-found: ignore
          retention-days: 7
