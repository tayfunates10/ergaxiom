name: Temporary fix sRGB test paths

on:
  push:
    branches:
      - agent/inkscape-srgb-certified-delivery-v1
    paths:
      - ".github/workflows/temp-fix-srgb-test-paths.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 14
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/inkscape-srgb-certified-delivery-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Verify include paths
        shell: python
        run: |
          from pathlib import Path
          path = Path("crates/graphic-inkscape-srgb-certified-delivery-runtime/tests/support/mod.rs")
          text = path.read_text(encoding="utf-8")
          if '../../../../examples/work-contracts/social-media-static-post.json' not in text:
              raise SystemExit("contract include path not fixed")
          if '../../../../professions/graphic-designer/profession.json' not in text:
              raise SystemExit("capsule include path not fixed")

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit formatter output
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/graphic-inkscape-srgb-certified-delivery-runtime/tests/support/mod.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format sRGB certification fixture"
          git push origin HEAD:agent/inkscape-srgb-certified-delivery-v1
