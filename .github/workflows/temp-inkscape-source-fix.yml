name: Temporary Inkscape source fix

on:
  push:
    branches:
      - agent/inkscape-adapter-v1
    paths:
      - ".github/workflows/temp-inkscape-source-fix.yml"
      - "crates/inkscape-adapter-runtime/src/lib.rs"
      - "crates/inkscape-adapter-runtime/tests/document_model.rs"

permissions:
  contents: write

jobs:
  patch-and-format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/inkscape-adapter-v1
          fetch-depth: 0

      - name: Apply exact source fixes
        shell: python
        run: |
          from pathlib import Path

          lib = Path("crates/inkscape-adapter-runtime/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          old = '''        let value = attribute
              .decode_and_unescape_value(decoder)
              .map_err(|error| InkscapeAdapterError::Xml(error.to_string()))?
              .into_owned();'''
          new = '''        let decoded = decoder
              .decode(attribute.value.as_ref())
              .map_err(|error| InkscapeAdapterError::Xml(error.to_string()))?;
          let value = unescape(&decoded)
              .map_err(|error| InkscapeAdapterError::Xml(error.to_string()))?
              .into_owned();'''
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("quick-xml replacement target not found")
          lib.write_text(text, encoding="utf-8")

          tests = Path("crates/inkscape-adapter-runtime/tests/document_model.rs")
          text = tests.read_text(encoding="utf-8")
          start_old = '        r#"<?xml version="1.0" encoding="UTF-8"?>'
          start_new = '        r##"<?xml version="1.0" encoding="UTF-8"?>'
          end_old = '</svg>\n"#\n'
          end_new = '</svg>\n"##\n'
          if start_old in text:
              text = text.replace(start_old, start_new, 1)
          elif start_new not in text:
              raise SystemExit("raw-string start target not found")
          if end_old in text:
              text = text.replace(end_old, end_new, 1)
          elif end_new not in text:
              raise SystemExit("raw-string end target not found")
          tests.write_text(text, encoding="utf-8")

      - name: Format Rust sources
        run: cargo fmt --all

      - name: Commit exact fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/inkscape-adapter-runtime/src/lib.rs \
            crates/inkscape-adapter-runtime/tests/document_model.rs
          if git diff --cached --quiet; then
            echo "No source changes were required"
            exit 0
          fi
          git commit -m "Fix Inkscape adapter compilation"
          git push origin HEAD:agent/inkscape-adapter-v1
