name: Brand export source fix

on:
  pull_request:
    paths:
      - ".github/workflows/brand-export-source-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/brand-compliant-export-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply compiler fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          compiler = Path('crates/brand-compliant-export-certified-path-runtime/src/compiler.rs')
          text = compiler.read_text(encoding='utf-8')
          needle = '    BrandRuleManifest,\n'
          if needle not in text:
              raise SystemExit('compiler import not found')
          compiler.write_text(text.replace(needle, '', 1), encoding='utf-8')

          runtime = Path('crates/brand-compliant-export-certified-path-runtime/src/runtime.rs')
          text = runtime.read_text(encoding='utf-8')
          needle = '        editable_svg_digest: editable_digest,\n        delivery_png_digest: output_digest,\n'
          replacement = (
              '        editable_svg_digest: editable_digest,\n'
              '        raw_export_png_digest: raw_export_digest,\n'
              '        normalization_record: execution_record.normalization_record.clone(),\n'
              '        delivery_png_digest: output_digest,\n'
          )
          if needle not in text:
              raise SystemExit('validation initializer fields not found')
          runtime.write_text(text.replace(needle, replacement, 1), encoding='utf-8')

          svg = Path('crates/brand-compliant-export-certified-path-runtime/src/svg.rs')
          text = svg.read_text(encoding='utf-8')
          needle = '.decode_and_unescape_value(reader.decoder())'
          replacement = '.decoded_and_normalized_value(quick_xml::parser::XmlVersion::Implicit1_0, reader.decoder())'
          if needle not in text:
              raise SystemExit('quick-xml deprecated call not found')
          svg.write_text(text.replace(needle, replacement, 1), encoding='utf-8')
          PY
          cargo fmt --all

      - name: Commit verified fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/brand-compliant-export-certified-path-runtime/src/compiler.rs \
            crates/brand-compliant-export-certified-path-runtime/src/runtime.rs \
            crates/brand-compliant-export-certified-path-runtime/src/svg.rs
          git commit -m "Fix brand export validation compilation"
          git push origin HEAD:${{ github.head_ref }}
