name: Temporary Inkscape rustfmt

on:
  push:
    branches:
      - agent/inkscape-adapter-v1
    paths:
      - ".github/workflows/temp-inkscape-rustfmt.yml"

permissions:
  contents: write

jobs:
  format-and-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/inkscape-adapter-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit formatter output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/inkscape-adapter-runtime
          if git diff --cached --quiet; then
            echo "No formatter changes"
            exit 0
          fi
          git commit -m "Format Inkscape adapter sources"
          git push origin HEAD:agent/inkscape-adapter-v1
