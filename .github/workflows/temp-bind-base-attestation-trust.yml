name: Temporary bind base attestation trust

on:
  push:
    branches:
      - agent/inkscape-srgb-certified-delivery-v1
    paths:
      - ".github/workflows/temp-bind-base-attestation-trust.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 17
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/inkscape-srgb-certified-delivery-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Add trusted base-attestation verification
        shell: python
        run: |
          from pathlib import Path

          lib = Path("crates/graphic-inkscape-srgb-certified-delivery-runtime/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          old = "    pub normalization_keys: &'a NormalizationKeyRegistry,\n    pub contract_value: &'a Value,"
          new = "    pub normalization_keys: &'a NormalizationKeyRegistry,\n    pub base_attestation_keys: &'a AttestationKeyRegistry,\n    pub contract_value: &'a Value,"
          if old not in text:
              raise SystemExit("request field insertion target not found")
          text = text.replace(old, new, 1)

          old = '''    validate_base_bindings(
        &request.base_delivery,
        request.compiled_contract,
        request.compiled_plan,
        request.assurance_level,
    )?;'''
          new = '''    validate_base_bindings(
        &request.base_delivery,
        request.base_attestation_keys,
        request.compiled_contract,
        request.compiled_plan,
        request.assurance_level,
    )?;'''
          if old not in text:
              raise SystemExit("base binding call target not found")
          text = text.replace(old, new, 1)

          old = '''fn validate_base_bindings(
    base: &CertifiedInkscapeGraphicDelivery,
    compiled_contract: &CompiledContract,
    compiled_plan: &CompiledPlan,
    assurance_level: AssuranceLevel,
) -> Result<(), InkscapeSrgbCertificationError> {
    let certificate = &base.attestation.certificate.payload;'''
          new = '''fn validate_base_bindings(
    base: &CertifiedInkscapeGraphicDelivery,
    base_attestation_keys: &AttestationKeyRegistry,
    compiled_contract: &CompiledContract,
    compiled_plan: &CompiledPlan,
    assurance_level: AssuranceLevel,
) -> Result<(), InkscapeSrgbCertificationError> {
    let base_bundle_value = serde_json::to_value(&base.evidence_bundle)
        .map_err(InkscapeSrgbCertificationError::Serialization)?;
    let independently_verified = verify_attestation_against_bundle(
        &base.attestation,
        base_attestation_keys,
        compiled_contract.clone(),
        compiled_plan,
        &base_bundle_value,
        assurance_level,
    )?;
    if independently_verified != base.verified_attestation {
        return Err(InkscapeSrgbCertificationError::BaseCertificationBindingMismatch);
    }
    let certificate = &base.attestation.certificate.payload;'''
          if old not in text:
              raise SystemExit("base binding function target not found")
          lib.write_text(text.replace(old, new, 1), encoding="utf-8")

          tests = Path("crates/graphic-inkscape-srgb-certified-delivery-runtime/tests/certified_srgb_delivery.rs")
          text = tests.read_text(encoding="utf-8")
          text = text.replace(
              "    let base_delivery = certify_base_delivery(\n",
              "    let base_attestation_keys = attestation_keys(&context)?;\n    let base_delivery = certify_base_delivery(\n",
          )
          text = text.replace(
              "        normalization_keys: &normalization.keys,\n        contract_value:",
              "        normalization_keys: &normalization.keys,\n        base_attestation_keys: &base_attestation_keys,\n        contract_value:",
          )
          text = text.replace(
              "    let keys = attestation_keys(&context)?;\n",
              "    let keys = base_attestation_keys;\n",
              1,
          )
          tests.write_text(text, encoding="utf-8")

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit trust binding
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/graphic-inkscape-srgb-certified-delivery-runtime
          git commit -m "Verify base Inkscape attestation with trusted keys"
          git push origin HEAD:agent/inkscape-srgb-certified-delivery-v1
