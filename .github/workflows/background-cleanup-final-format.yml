name: Background cleanup final formatter

on:
  pull_request:
    paths:
      - ".github/workflows/background-cleanup-final-format.yml"
      - "crates/background-cleanup-certified-path-runtime/**"

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'agent/background-cleanup-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format signed cleanup evidence
        run: cargo fmt --all

      - name: Commit formatter output
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/background-cleanup-certified-path-runtime
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format signed cleanup evidence"
          git push origin HEAD:${{ github.head_ref }}
