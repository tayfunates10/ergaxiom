name: Temporary certified delivery fix

on:
  push:
    branches:
      - agent/graphic-certified-delivery-v1

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/graphic-certified-delivery-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Apply targeted ownership fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/graphic-certified-delivery-runtime/src/lib.rs')
          text = path.read_text()
          text = text.replace(
              'use ergaxiom_capability_runtime::{\n    AuthorizationReceipt, CapabilityAuthorizer, CapabilityError,\n};',
              'use ergaxiom_capability_runtime::{CapabilityAuthorizer, CapabilityError};',
          )
          text = text.replace(
              'pub fn certify_graphic_delivery(\n    request: GraphicCertificationRequest<\'_>,',
              'pub fn certify_graphic_delivery(\n    mut request: GraphicCertificationRequest<\'_>,',
          )
          text = text.replace(
              'let receipt_records = authorize_plan_steps(&request)?;',
              'let receipt_records = authorize_plan_steps(&mut request)?;',
          )
          text = text.replace(
              'fn authorize_plan_steps(\n    request: &GraphicCertificationRequest<\'_>,',
              'fn authorize_plan_steps(\n    request: &mut GraphicCertificationRequest<\'_>,',
          )
          path.write_text(text)
          PY

      - name: Apply machine-safe Clippy fixes
        run: cargo clippy --fix --workspace --all-targets --all-features --allow-dirty --allow-staged

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --quiet && exit 0
          git commit -m "Fix certified delivery ownership and formatting"
          git push origin HEAD:agent/graphic-certified-delivery-v1
