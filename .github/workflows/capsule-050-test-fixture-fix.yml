name: Capsule 0.5.0 test fixture fix

on:
  pull_request:
    paths:
      - ".github/workflows/capsule-050-test-fixture-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/brand-compliant-export-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Update prior certified-path capsule assertions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          paths = [
              Path('crates/background-cleanup-certified-path-runtime/tests/path.rs'),
              Path('crates/intent-contract-compiler-runtime/tests/static_social_post.rs'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              old = 'contract["profession"]["capsule_version"], "0.4.0"'
              new = 'contract["profession"]["capsule_version"], "0.5.0"'
              if old not in text:
                  raise SystemExit(f'capsule assertion not found: {path}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          cargo fmt --all
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/background-cleanup-certified-path-runtime/tests/path.rs \
            crates/intent-contract-compiler-runtime/tests/static_social_post.rs
          git commit -m "Update certified-path capsule test fixtures"
          git push origin HEAD:${{ github.head_ref }}
