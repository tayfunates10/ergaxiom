name: Capsule version sync

on:
  pull_request:
    paths:
      - "examples/work-contracts/social-media-static-post.json"
      - "professions/graphic-designer/profession.json"
      - ".github/workflows/capsule-version-sync.yml"

permissions:
  contents: write

jobs:
  sync-example-contract:
    if: github.head_ref == 'agent/inkscape-operator-expansion-v1'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Bind example contract to capsule 0.3.0
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("examples/work-contracts/social-media-static-post.json")
          contract = json.loads(path.read_text(encoding="utf-8"))
          if contract["profession"]["capsule_id"] != "ergaxiom.profession.graphic-designer":
              raise SystemExit("unexpected profession capsule id")
          contract["profession"]["capsule_version"] = "0.3.0"
          path.write_text(json.dumps(contract, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit synchronized contract
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add examples/work-contracts/social-media-static-post.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Bind example contract to Graphic Designer capsule 0.3.0"
          git push origin HEAD:${{ github.head_ref }}
