name: Brand export lifetime fix

on:
  pull_request:
    paths:
      - ".github/workflows/brand-export-lifetime-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/brand-compliant-export-certified-path-v1'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Elide planner lifetimes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/brand-compliant-export-certified-path-runtime/src/planner.rs')
          text = path.read_text(encoding='utf-8')
          old = """fn resolve_operator_versions<'a>(
              capsule: &'a CapsulePlanningView,
          ) -> Result<BTreeMap<&'a str, &'a str>, BrandExportPlannerError> {
          """
          new = """fn resolve_operator_versions(
              capsule: &CapsulePlanningView,
          ) -> Result<BTreeMap<&str, &str>, BrandExportPlannerError> {
          """
          if old not in text:
              raise SystemExit('planner lifetime block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          cargo fmt --all
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add crates/brand-compliant-export-certified-path-runtime/src/planner.rs
          git commit -m "Elide brand export planner lifetimes"
          git push origin HEAD:${{ github.head_ref }}
