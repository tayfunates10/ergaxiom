name: Temporary fix PNG sRGB normalizer

on:
  push:
    branches:
      - agent/png-srgb-normalizer-v1
    paths:
      - ".github/workflows/temp-fix-png-srgb-normalizer.yml"

permissions:
  contents: write

jobs:
  fix-and-format:
    runs-on: ubuntu-24.04
    timeout-minutes: 14
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/png-srgb-normalizer-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Apply API and test corrections
        shell: python
        run: |
          from pathlib import Path

          lib = Path("crates/png-srgb-normalizer-runtime/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          old_import = "use quick_xml::Reader;"
          new_import = "use quick_xml::{Reader, XmlVersion};"
          if old_import in text:
              text = text.replace(old_import, new_import, 1)
          elif new_import not in text:
              raise SystemExit("quick-xml import target not found")

          old_call = ".decode_and_unescape_value(decoder)"
          new_call = ".decoded_and_normalized_value(XmlVersion::Implicit1_0, decoder)"
          if old_call in text:
              text = text.replace(old_call, new_call, 1)
          elif new_call not in text:
              raise SystemExit("quick-xml call target not found")
          lib.write_text(text, encoding="utf-8")

          tests = Path("crates/png-srgb-normalizer-runtime/tests/normalizer.rs")
          test_text = tests.read_text(encoding="utf-8")
          test_text = test_text.replace(
              "assert_eq!(evidence.color_declaration_count, 4);",
              "assert_eq!(evidence.color_declaration_count, 3);",
              1,
          )
          tests.write_text(test_text, encoding="utf-8")

      - name: Apply machine-safe Clippy fixes
        run: >-
          cargo clippy --fix
          -p ergaxiom-png-srgb-normalizer-runtime
          --all-targets
          --all-features
          --allow-dirty
          --allow-staged

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit fixes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/png-srgb-normalizer-runtime
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Fix and format PNG sRGB normalizer"
          git push origin HEAD:agent/png-srgb-normalizer-v1
