name: Temporary fix PNG sRGB normalizer

on:
  push:
    branches:
      - agent/png-srgb-normalizer-v1
    paths:
      - ".github/workflows/temp-fix-png-srgb-normalizer.yml"

permissions:
  contents: write

jobs:
  fix-and-format:
    runs-on: ubuntu-24.04
    timeout-minutes: 14
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/png-srgb-normalizer-v1
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply exact source fixes
        shell: python
        run: |
          from pathlib import Path

          lib = Path("crates/png-srgb-normalizer-runtime/src/lib.rs")
          text = lib.read_text(encoding="utf-8")
          text = text.replace(
              "use quick_xml::Reader;",
              "use quick_xml::{Reader, XmlVersion};",
              1,
          )
          text = text.replace(
              ".decode_and_unescape_value(decoder)",
              ".decoded_and_normalized_value(XmlVersion::Implicit1_0, decoder)",
              1,
          )
          old = '''            "filter" | "mix-blend-mode" | "isolation" | "background" => {
                if lower != "none" && lower != "normal" {
                    return Err(PngSrgbNormalizationError::UnsupportedSvgStyle(
                        declaration.to_owned(),
                    ));
                }
            }'''
          new = '''            "filter" | "mix-blend-mode" | "isolation" | "background"
                if lower != "none" && lower != "normal" =>
            {
                return Err(PngSrgbNormalizationError::UnsupportedSvgStyle(
                    declaration.to_owned(),
                ));
            }'''
          if old not in text:
              raise SystemExit("style match target not found")
          lib.write_text(text.replace(old, new, 1), encoding="utf-8")

          tests = Path("crates/png-srgb-normalizer-runtime/tests/normalizer.rs")
          test_text = tests.read_text(encoding="utf-8")
          old_assert = "assert_eq!(evidence.color_declaration_count, 4);"
          if old_assert not in test_text:
              raise SystemExit("color count assertion not found")
          tests.write_text(
              test_text.replace(
                  old_assert,
                  "assert_eq!(evidence.color_declaration_count, 3);",
                  1,
              ),
              encoding="utf-8",
          )

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit fixes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/png-srgb-normalizer-runtime
          git commit -m "Fix and format PNG sRGB normalizer"
          git push origin HEAD:agent/png-srgb-normalizer-v1
