name: Temporary Inkscape certified E2E rustfmt

on:
  push:
    branches:
      - agent/inkscape-certified-delivery-v2
    paths:
      - ".github/workflows/temp-inkscape-certified-e2e-rustfmt.yml"

permissions:
  contents: write

jobs:
  apply-format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/inkscape-certified-delivery-v2
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format workspace
        run: cargo fmt --all

      - name: Commit formatter output
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/graphic-inkscape-certified-delivery-runtime/tests/certified_inkscape_delivery.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format Inkscape certified delivery E2E test"
          git push origin HEAD:agent/inkscape-certified-delivery-v2
