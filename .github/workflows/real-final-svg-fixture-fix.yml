name: Real final secure SVG fixture fix

on:
  push:
    branches:
      - agent/real-final-artifact-ci-v1

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/real-final-artifact-ci-v1
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt

      - name: Replace forbidden image element with verified geometry
        shell: python
        run: |
          from pathlib import Path
          path = Path("crates/graphic-inkscape-final-certified-delivery-runtime/tests/real_final_certified_delivery.rs")
          text = path.read_text(encoding="utf-8")
          replacements = [
              ('use base64::{Engine as _, engine::general_purpose::STANDARD};\n', ''),
              ('real_fixture_svg(&approved_logo_png, "BEFORE").as_bytes()', 'real_fixture_svg("BEFORE").as_bytes()'),
              ('fn real_fixture_svg(approved_logo_png: &[u8], text: &str) -> String {\n    let data = STANDARD.encode(approved_logo_png);', 'fn real_fixture_svg(text: &str) -> String {'),
              ('<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="240" height="300" viewBox="0 0 240 300" id="root">', '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="300" viewBox="0 0 240 300" id="root">'),
              ('  <image id="approved-logo" x="24" y="24" width="80" height="40" preserveAspectRatio="none" href="data:image/png;base64,{data}" xlink:href="data:image/png;base64,{data}" />', '  <rect id="approved-logo" x="24" y="24" width="80" height="40" fill="#142850" />'),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"fixture replacement not found: {old[:80]}")
              text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")

      - run: cargo fmt --all

      - name: Remove workflow and push
        run: |
          rm .github/workflows/real-final-svg-fixture-fix.yml
          git config user.name "ergaxiom-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Use secure SVG geometry for approved logo fixture [skip ci]"
          git push origin HEAD:agent/real-final-artifact-ci-v1
