name: Windows UI Automation host

on:
  pull_request:
    paths:
      - "hosts/windows-uia/**"
      - "hosts/windows-uia-test-target/**"
      - "crates/windows-bridge-runtime/**"
      - "crates/windows-uia-client-runtime/**"
      - ".github/workflows/windows-uia-host.yml"
  push:
    branches:
      - main
    paths:
      - "hosts/windows-uia/**"
      - "hosts/windows-uia-test-target/**"
      - "crates/windows-bridge-runtime/**"
      - "crates/windows-uia-client-runtime/**"
      - ".github/workflows/windows-uia-host.yml"

permissions:
  contents: read

jobs:
  build-self-test-and-interop:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Windows projects
        shell: pwsh
        run: |
          dotnet restore hosts/windows-uia/Ergaxiom.WindowsUiaHost.csproj
          dotnet restore hosts/windows-uia-test-target/Ergaxiom.WindowsUiaTestTarget.csproj

      - name: Verify C# formatting
        shell: pwsh
        run: |
          dotnet format hosts/windows-uia/Ergaxiom.WindowsUiaHost.csproj --no-restore
          dotnet format hosts/windows-uia-test-target/Ergaxiom.WindowsUiaTestTarget.csproj --no-restore
          git diff --exit-code -- `
            ':(glob)hosts/windows-uia/*.cs' `
            ':(glob)hosts/windows-uia/*.csproj' `
            ':(glob)hosts/windows-uia-test-target/*.cs' `
            ':(glob)hosts/windows-uia-test-target/*.csproj'

      - name: Build Windows host and target
        shell: pwsh
        run: |
          dotnet build hosts/windows-uia/Ergaxiom.WindowsUiaHost.csproj `
            --configuration Release `
            --no-restore
          dotnet build hosts/windows-uia-test-target/Ergaxiom.WindowsUiaTestTarget.csproj `
            --configuration Release `
            --no-restore

      - name: Run Windows host self-tests
        run: dotnet run --project hosts/windows-uia/Ergaxiom.WindowsUiaHost.csproj --configuration Release --no-build -- --self-test

      - name: Restore win-x64 publish assets
        shell: pwsh
        run: |
          dotnet restore hosts/windows-uia/Ergaxiom.WindowsUiaHost.csproj --runtime win-x64
          dotnet restore hosts/windows-uia-test-target/Ergaxiom.WindowsUiaTestTarget.csproj --runtime win-x64

      - name: Publish Windows host and controlled target
        shell: pwsh
        run: |
          $hostOutput = Join-Path $env:RUNNER_TEMP "windows-uia-host"
          $targetOutput = Join-Path $env:RUNNER_TEMP "windows-uia-test-target"
          dotnet publish hosts/windows-uia/Ergaxiom.WindowsUiaHost.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --no-restore `
            --output $hostOutput
          dotnet publish hosts/windows-uia-test-target/Ergaxiom.WindowsUiaTestTarget.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --no-restore `
            --output $targetOutput
          $hostExe = Join-Path $hostOutput "Ergaxiom.WindowsUiaHost.exe"
          $targetExe = Join-Path $targetOutput "Ergaxiom.WindowsUiaTestTarget.exe"
          if (-not (Test-Path $hostExe)) {
            throw "Published Windows host executable was not found: $hostExe"
          }
          if (-not (Test-Path $targetExe)) {
            throw "Published WPF target executable was not found: $targetExe"
          }
          $hostDigest = (Get-FileHash -Algorithm SHA256 $hostExe).Hash.ToLowerInvariant()
          "ERGAXIOM_WINDOWS_UIA_HOST=$hostExe" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append
          "ERGAXIOM_WINDOWS_UIA_HOST_SHA256=$hostDigest" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append
          "ERGAXIOM_WINDOWS_UIA_TARGET=$targetExe" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append
          "ERGAXIOM_WINDOWS_UIA_TARGET_APPLICATION_ID=Ergaxiom.WindowsUiaTestTarget" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append
          "ERGAXIOM_WINDOWS_UIA_TARGET_VERSION=1.0.0.0" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Encoding utf8 `
            -Append

      - name: Run Rust bridge-to-host protocol test
        run: cargo test -p ergaxiom-windows-bridge-runtime --test windows_uia_host_process

      - name: Run digest-pinned Rust UIA client tests
        run: cargo test -p ergaxiom-windows-uia-client-runtime --test windows_process_transport

      - name: Run real WPF UI Automation action through signed Bridge Runtime
        run: cargo test -p ergaxiom-windows-uia-client-runtime --test windows_real_uia_action -- --nocapture

      - name: Upload published Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: ergaxiom-windows-uia-real-action-win-x64
          path: |
            ${{ runner.temp }}/windows-uia-host
            ${{ runner.temp }}/windows-uia-test-target
          if-no-files-found: error
          retention-days: 7
